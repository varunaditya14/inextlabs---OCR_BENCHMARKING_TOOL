services:
  backend:
    build:
      context: ./ocr-benchmark/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./ocr-benchmark/backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped